name: Build Docker Images

on:
  push:
    branches: [ main, master ]
    paths:
      - 'cni.Dockerfile'
      - 'controller.Dockerfile'
      - '.github/workflows/docker-build.yml'
  pull_request:
    branches: [ main, master ]
    paths:
      - 'cni.Dockerfile'
      - 'controller.Dockerfile'
      - '.github/workflows/docker-build.yml'
  workflow_dispatch:
    inputs:
      upper_constraints_file:
        description: 'OpenStack upper constraints file URL'
        required: false
        default: 'https://releases.openstack.org/constraints/upper/master'

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: kuryr-kubernetes
  OWNER: ${{ github.repository_owner }}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        image: [cni, controller]
        include:
          - image: cni
            dockerfile: cni.Dockerfile
            context: .
          - image: controller
            dockerfile: controller.Dockerfile
            context: .

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.CR_PAT }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value={{branch}},enable=${{ github.ref_name != 'main' && github.ref_name != 'master' }}
            type=raw,value=dev,enable=${{ github.event_name == 'pull_request' }}
            type=sha,prefix={{branch}}-,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            UPPER_CONSTRAINTS_FILE=${{ inputs.upper_constraints_file || 'https://releases.openstack.org/constraints/upper/master' }}
            OSLO_LOCK_PATH=/var/kuryr-lock
            CNI_DAEMON=True
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

      - name: Test image
        run: |
          IMAGE="${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-${{ matrix.image }}"
          TAG=$(echo "${{ steps.meta.outputs.tags }}" | head -1)
          
          echo "正在测试镜像: $TAG"
          
          # 基础测试
          docker run --rm $TAG python3 --version
          
          # 特定组件测试
          if [ "${{ matrix.image }}" = "cni" ]; then
            echo "测试 CNI 组件..."
            docker run --rm $TAG ls -la /kuryr-cni
            docker run --rm $TAG ls -la /etc/kuryr-cni
          elif [ "${{ matrix.image }}" = "controller" ]; then
            echo "测试 Controller 组件..."
            docker run --rm $TAG kuryr-k8s-controller --help
          fi

  summary:
    runs-on: ubuntu-latest
    needs: build
    if: always()
    steps:
      - name: Generate summary
        run: |
          echo "## Kuryr Kubernetes 镜像构建总结" >> $GITHUB_STEP_SUMMARY
          echo "| 镜像 | 状态 |" >> $GITHUB_STEP_SUMMARY
          echo "|------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| kuryr-kubernetes-cni | ${{ needs.build.result == 'success' && '✅ 成功' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| kuryr-kubernetes-controller | ${{ needs.build.result == 'success' && '✅ 成功' || '❌ 失败' }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 可用镜像:" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-cni:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "- \`${{ env.REGISTRY }}/${{ env.OWNER }}/${{ env.IMAGE_PREFIX }}-controller:latest\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### 构建参数:" >> $GITHUB_STEP_SUMMARY
          echo "- 上游约束文件: \`${{ inputs.upper_constraints_file || 'https://releases.openstack.org/constraints/upper/master' }}\`" >> $GITHUB_STEP_SUMMARY
          echo "- CNI 守护进程: \`True\`" >> $GITHUB_STEP_SUMMARY
          echo "- Oslo 锁路径: \`/var/kuryr-lock\`" >> $GITHUB_STEP_SUMMARY